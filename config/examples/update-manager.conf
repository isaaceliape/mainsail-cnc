# Mainsail-CNC update-manager snippet for Moonraker
# ------------------------------------------------------------
# Drop this in (or include it from moonraker.conf) to register
# mainsail-cnc with Moonraker's update manager. The agent, the
# Mainsail fork, and the Klipper macros all live in the
# mainsail-cnc monorepo, so a single [update_manager] entry
# pointing at the monorepo root covers all three. They version
# together; a real git clone (not a synthetic subpath) avoids
# the "ahead 1, behind N, is_valid=false" state that happens
# when individual subdirs are git-init'd in place.
#
# The post_update_script runs automatically after every `git pull`
# and handles frontend rebuild (via pre-built nightly CI release),
# agent re-vendor, and plugin re-deploy. See scripts/post_update.sh.
#
# Two ways to use it:
#
#   (a) Include from your active moonraker.conf:
#
#         [include config/examples/update-manager.conf]
#
#       (adjust the path to match where this file lives on
#       your printer, e.g. ~/printer_data/config/update-manager.conf
#       after you copy it there).
#
#   (b) Let the Ansible install playbook or bash script do it for you:
#
#         ansible-playbook ansible/playbooks/install.yml   # recommended
#         ./scripts/install_to_moonraker.sh                # legacy
# ------------------------------------------------------------

[update_manager mainsail-cnc]
type: git_repo
channel: dev
path: ~/mainsail-cnc
origin: https://github.com/isaaceliape/mainsail-cnc.git
primary_branch: main
enable_node_updates: False
is_system_service: False
post_update_script: ~/mainsail-cnc/scripts/post_update.sh
managed_services: klipper moonraker
refresh_interval: 24
