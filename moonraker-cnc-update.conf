# Moonraker update_manager entry for E3CNC UI
# Add to your moonraker.conf or include via: [include E3CNC_UI-update.conf]
#
# If you previously installed mainsail-cnc and want to migrate to the
# official E3CNC UI repo:
#
#   1. Stop moonraker:  sudo systemctl stop moonraker
#   2. cd ~/mainsail-cnc
#   3. git remote set-url origin https://github.com/E3CNC/E3CNC_UI.git
#   4. git pull
#   5. Start moonraker: sudo systemctl start moonraker
#
# The post_update_script is an actual executable that runs after git pull.
# scripts/post_update.sh handles frontend rebuild, agent re-vendor, and
# Klipper plugin re-deploy automatically.

[update_manager E3CNC_UI]
type: git_repo
channel: dev
path: ~/E3CNC_UI
origin: https://github.com/E3CNC/E3CNC_UI.git
primary_branch: main
enable_node_updates: False
is_system_service: False
post_update_script: ~/E3CNC_UI/scripts/post_update.sh
managed_services: klipper moonraker
refresh_interval: 24
