# Moonraker update_manager entry for Mainsail CNC fork
# Add to your moonraker.conf or include via: [include mainsail-cnc-update.conf]
#
# The post_update_script is an actual executable that runs after git pull.
# scripts/post_update.sh handles frontend rebuild, agent re-vendor, and
# Klipper plugin re-deploy automatically.

[update_manager mainsail-cnc]
type: git_repo
channel: dev
path: ~/mainsail-cnc
origin: https://github.com/isaaceliape/mainsail-cnc.git
primary_branch: main
enable_node_updates: False
is_system_service: False
post_update_script: ~/mainsail-cnc/scripts/post_update.sh
managed_services: klipper moonraker
refresh_interval: 24
