name: Build Frontend

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and publish frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get package version
        id: pkgver
        run: echo "VERSION=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Write version.json into dist
        run: |
          echo "{\"buildTime\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"commit\":\"${{ github.sha }}\"}" > dist/version.json

      - name: Create dist archive
        run: |
          cp ./remote/* ./dist/ 2>/dev/null || true
          cd dist && zip -r ../mainsail-cnc-${{ steps.pkgver.outputs.VERSION }}.zip . && cd ..

      - name: Upload dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: dist/
          retention-days: 30

      - name: Get short commit SHA
        id: commit
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Write release notes
        run: |
          echo "### Auto-built from commit ${{ github.sha }}" > nightly-notes.md
          echo "" >> nightly-notes.md
          echo "---" >> nightly-notes.md
          echo "### Changelog" >> nightly-notes.md
          echo "" >> nightly-notes.md
          PREV=$(git rev-parse --verify refs/tags/nightly 2>/dev/null || echo "")
          python3 scripts/_gen_changelog.py "$PREV" >> nightly-notes.md

      - name: Publish nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view nightly >/dev/null 2>&1; then
            echo "Nightly release exists — updating in place"
            gh release edit nightly \
              --title "${{ steps.pkgver.outputs.VERSION }}-nightly (${{ steps.commit.outputs.SHA_SHORT }})" \
              --notes-file nightly-notes.md \
              --target "${{ github.sha }}"
            gh release upload nightly mainsail-cnc-${{ steps.pkgver.outputs.VERSION }}.zip --clobber
          else
            echo "No existing nightly release — creating fresh"
            gh release create nightly \
              --title "${{ steps.pkgver.outputs.VERSION }}-nightly (${{ steps.commit.outputs.SHA_SHORT }})" \
              --notes-file nightly-notes.md \
              --target "${{ github.sha }}" \
              mainsail-cnc-${{ steps.pkgver.outputs.VERSION }}.zip
          fi
