name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Optional semver tag for the release (e.g. v0.4.2). If empty, uses a semver tag on HEAD, then falls back to package.json.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          INPUT_TAG='${{ github.event.inputs.version_tag }}'
          HEAD_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)

          if [[ -n "$INPUT_TAG" ]]; then
            VERSION="$INPUT_TAG"
          elif [[ -n "$HEAD_TAG" ]]; then
            VERSION="$HEAD_TAG"
          else
            VERSION="v$(node -p "require('./package.json').version")"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Using release version: $VERSION"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Write version.json into dist
        run: |
          echo "{\"buildTime\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"commit\":\"${{ github.sha }}\"}" > dist/version.json

      - name: Create dist archive
        run: |
          cp ./remote/* ./dist/ 2>/dev/null || true
          cd dist && zip -r ../mainsail-cnc-${{ steps.version.outputs.VERSION }}.zip . && cd ..

      - name: Upload dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: dist/
          retention-days: 30

      - name: Get short commit SHA
        id: commit
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Write release notes
        run: |
          echo "### Auto-built from commit ${{ github.sha }}" > release-notes.md
          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "### Changelog" >> release-notes.md
          echo "" >> release-notes.md
          CURRENT='${{ steps.version.outputs.VERSION }}'
          PREV=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -Fxv "$CURRENT" | head -n1 || echo "")
          python3 scripts/_gen_changelog.py "$PREV" >> release-notes.md

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION='${{ steps.version.outputs.VERSION }}'
          ASSET="mainsail-cnc-${VERSION}.zip"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Updating existing release: $VERSION"
            gh release upload "$VERSION" "$ASSET" --clobber
            gh release edit "$VERSION" \
              --title "${VERSION} (${{ steps.commit.outputs.SHA_SHORT }})" \
              --notes-file release-notes.md \
              --target main
          else
            echo "Creating release: $VERSION"
            gh release create "$VERSION" \
              --title "${VERSION} (${{ steps.commit.outputs.SHA_SHORT }})" \
              --notes-file release-notes.md \
              --target main \
              "$ASSET"
          fi
