name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Optional version tag for the release (e.g. v0.1.0). If empty, uses package.json version.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get package version
        id: pkgver
        run: echo "VERSION=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Write version.json into dist
        run: |
          echo "{\"buildTime\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"commit\":\"${{ github.sha }}\"}" > dist/version.json

      - name: Create dist archive
        run: |
          cp ./remote/* ./dist/ 2>/dev/null || true
          cd dist && zip -r ../mainsail-cnc-${{ steps.pkgver.outputs.VERSION }}.zip . && cd ..

      - name: Upload dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: dist/
          retention-days: 30

      - name: Get short commit SHA
        id: commit
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Write release notes
        run: |
          echo "### Auto-built from commit ${{ github.sha }}" > nightly-notes.md
          echo "" >> nightly-notes.md
          echo "---" >> nightly-notes.md
          echo "### Changelog" >> nightly-notes.md
          echo "" >> nightly-notes.md
          PREV=$(git describe --tags --match 'nightly-main-*' --abbrev=0 2>/dev/null || echo "")
          python3 scripts/_gen_changelog.py "$PREV" >> nightly-notes.md

      - name: Publish nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NIGHTLY_TAG="nightly-main-$(date +%Y%m%d)-${GITHUB_RUN_ID}"
          echo "Creating nightly release: $NIGHTLY_TAG"
          gh release create "$NIGHTLY_TAG" \
            --title "${{ steps.pkgver.outputs.VERSION }}-nightly-main (${{ steps.commit.outputs.SHA_SHORT }})" \
            --notes-file nightly-notes.md \
            --target main \
            mainsail-cnc-${{ steps.pkgver.outputs.VERSION }}.zip
