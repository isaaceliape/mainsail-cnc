---
- name: Uninstall mainsail-cnc — reverse of install.yml
  hosts: cnc
  gather_facts: true
  vars_files:
    - ../vars/main.yml
  tasks:
    - name: Remove vendored cnc_agent component
      ansible.builtin.file:
        path: '{{ agent.vender_dir }}/cnc_agent'
        state: absent

    - name: Remove vendored cnc_metadata component
      ansible.builtin.file:
        path: '{{ agent.vender_dir }}/cnc_metadata'
        state: absent

    - name: Remove cnc_metadata_extractor.py
      ansible.builtin.file:
        path: '{{ printer_data.scripts_dir }}/cnc_metadata_extractor.py'
        state: absent

    - name: Remove [cnc_agent] section header from moonraker.conf
      ansible.builtin.lineinfile:
        path: '{{ moonraker_conf }}'
        line: '[cnc_agent]'
        state: absent

    - name: Remove extractor_path from [cnc_metadata] section
      community.general.ini_file:
        path: '{{ moonraker_conf }}'
        section: cnc_metadata
        option: extractor_path
        state: absent
        value_delimiter: ': '

    - name: Remove timeout from [cnc_metadata] section
      community.general.ini_file:
        path: '{{ moonraker_conf }}'
        section: cnc_metadata
        option: timeout
        state: absent
        value_delimiter: ': '

    - name: Remove [update_manager mainsail-cnc] block from moonraker.conf
      ansible.builtin.blockinfile:
        path: '{{ moonraker_conf }}'
        marker: '# {mark} ANSIBLE MANAGED BLOCK - update_manager mainsail-cnc'
        state: absent

    - name: Remove work_coordinate_systems.py from klippy/extras/
      ansible.builtin.file:
        path: '{{ klipper.extras_dir }}/work_coordinate_systems.py'
        state: absent

    - name: Remove E3CNC directory from printer_data/config/
      ansible.builtin.file:
        path: '{{ printer_data.E3CNC_dir }}'
        state: absent
      ignore_errors: true

    - name: Restart moonraker
      ansible.builtin.systemd:
        name: moonraker
        state: restarted
      become: true
      tags:
        - restart-services
