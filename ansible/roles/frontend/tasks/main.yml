---
# Deploy frontend — download pre-built nightly release, skip local build on-device
- name: Deploy frontend via download_frontend script
  ansible.builtin.script:
    cmd: '{{ repo.dest }}/scripts/download_frontend.sh {{ frontend.web_root }}'
    chdir: '{{ repo.dest }}'
  register: frontend_deploy
  changed_when: '"Frontend updated" in frontend_deploy.stdout or "built locally" in frontend_deploy.stdout'
  when: not ansible_check_mode

- name: Ensure web root directory exists
  ansible.builtin.file:
    path: '{{ frontend.web_root }}'
    state: directory
    mode: '0755'

- name: Deploy built frontend to web root
  ansible.builtin.copy:
    src: '{{ repo.dest }}/dist/'
    dest: '{{ frontend.web_root }}/'
    remote_src: true

- name: Get git commit hash for version stamp
  ansible.builtin.command:
    cmd: git rev-parse --short HEAD
    chdir: '{{ repo.dest }}'
  register: git_commit
  changed_when: false
  when: not ansible_check_mode

- name: Write version.json
  ansible.builtin.copy:
    dest: '{{ frontend.web_root }}/version.json'
    content: |
      {
        "buildTime": "{{ ansible_date_time.iso8601 }}",
        "commit": "{{ git_commit.stdout | default('unknown') }}"
      }
    mode: '0644'

- name: Reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  become: true
  tags:
    - restart-services
