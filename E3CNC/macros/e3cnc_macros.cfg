# E3CNC machine macros
# Include this file from printer.cfg (must be LAST include to override PAUSE/RESUME):
#   [include E3CNC/macros/e3cnc_macros.cfg]
[gcode_macro PRE_HOMING_Z]
description: Position spindle before z probing
gcode:
    G90
    G1 X5 Y5 F1200

[gcode_macro POST_HOMING_Z]
description: Position spindle before z probing
gcode:
    G90
    G1 Z25 F4000

[homing_override]
axes: xyz
gcode:
    G90
    {% if 'Z' in params and 'z' in printer.toolhead.homed_axes %}
        G91
        G1 Z5 F180
        G90
    {% endif %}
    {% if 'X' in params or 'Y' in params or 'Z' in params %}
        {% if 'X' in params %}
            G4 P1500
            G28 X
            G91
            G1 X5 F1200
            G90
        {% endif %}
        {% if 'Y' in params %}
            G4 P1500
            G28 Y
            G91
            G1 Y5 F1200
            G90
        {% endif %}
        {% if 'Z' in params %}
            G28 Z
            G90
            G0 Z25 F4000
        {% endif %}
    {% else %}
        G4 P1500
        G28 X
        G91
        G1 X5 F1200
        G90
        G4 P1500
        G28 Y
        G91
        G1 Y5 F1200
        G90
        G28 Z
        G90
        POST_HOMING_Z
    {% endif %}

[gcode_macro _HOME_X]
description: Home X axis with sensorless homing
gcode:
    G4 P1500
    G28 X
    G91
    G1 X5 F1200
    G90

[gcode_macro _HOME_Y]
description: Home Y axis with sensorless homing
gcode:
    G4 P1500
    G28 Y
    G91
    G1 Y5 F1200
    G90

[gcode_macro _HOME_Z]
description: Home Z axis
gcode:
    PRE_HOMING_Z
    G28 Z
    POST_HOMING_Z

# Dashboard compatibility aliases
[gcode_macro HOME_X]
description: Home X axis
gcode:
    _HOME_X

[gcode_macro HOME_Y]
description: Home Y axis
gcode:
    _HOME_Y

[gcode_macro HOME_Z]
description: Home Z axis
gcode:
    _HOME_Z

[gcode_macro BEEP_TEST]
description: Play a short beeper test pattern
gcode:
  M300 S880 P120
  G4 P80
  M300 S1320 P150
  G4 P80
  M300 S1760 P180

# ---------------------------------------------------------------------------
# Spindle/coolant overrides (no spindle wired yet — using router)
# ---------------------------------------------------------------------------

[gcode_macro M3]
description: Spindle CW (disabled — no spindle wired)
gcode:
    RESPOND PREFIX="info" MSG="M3 ignored — no spindle wired"

[gcode_macro M4]
description: Spindle CCW (disabled — no spindle wired)
gcode:
    RESPOND PREFIX="info" MSG="M4 ignored — no spindle wired"

[gcode_macro M5]
description: Spindle Off (disabled — no spindle wired)
gcode:
    RESPOND PREFIX="info" MSG="M5 ignored — no spindle wired"

[gcode_macro M7]
description: Mist coolant (disabled — no coolant wired)
gcode:
    RESPOND PREFIX="info" MSG="M7 ignored — no coolant wired"

[gcode_macro M8]
description: Flood coolant (disabled — no coolant wired)
gcode:
    RESPOND PREFIX="info" MSG="M8 ignored — no coolant wired"

[gcode_macro M9]
description: Coolant Off (disabled — no coolant wired)
gcode:
    RESPOND PREFIX="info" MSG="M9 ignored — no coolant wired"

# ---------------------------------------------------------------------------
# CNC-safe PAUSE / RESUME / CANCEL_PRINT
# Override 3D-printer defaults (filament sensor, extruder, hotend).
# These must be the LAST [gcode_macro PAUSE] definition in the include
# order, so ensure e3cnc_macros.cfg is included LAST from printer.cfg.
# ---------------------------------------------------------------------------

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
description: Pause CNC job — stop spindle, lift Z, park at front center
gcode:
    {% set z = params.Z|default(10)|int %}
    BASE_PAUSE                                                              ; set paused state first (prevents M3→PAUSE recursion)
    # M5                                                                     ; stop spindle (disabled — no spindle wired yet)
    # M9                                                                     ; stop coolant (disabled — no spindle wired yet)
    {% if (printer.gcode_move.position.z + z) < printer.toolhead.axis_maximum.z %}
        G91
        G1 Z{z} F900
    {% endif %}
    G90
    G1 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} F6000
    SAVE_GCODE_STATE NAME=PAUSE_STATE
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z}

[gcode_macro RESUME]
rename_existing: BASE_RESUME
description: Resume CNC job — return to position, restart spindle
variable_zhop: 0
gcode:
    {% if printer['pause_resume'].is_paused|int == 1 %}
        RESTORE_GCODE_STATE NAME=PAUSE_STATE MOVE=1 MOVE_SPEED=100
        G91
        G1 Z{zhop * -1} F900
        G90
        BASE_RESUME
        # M3                                                                 ; restart spindle (disabled — no spindle wired yet)
    {% endif %}

# ---------------------------------------------------------------------------
# Job end overrides — lift Z, park, keep steppers engaged
# ---------------------------------------------------------------------------

[gcode_macro FINISH_JOB]
description: Finish CNC job — lift Z to 25, park at X0 Y0, keep steppers on
gcode:
    G90
    G53 G0 Z25 F4000                ; Lift Z to 25mm in machine coords
    G53 G0 X0 Y0 F3000             ; Park at X0 Y0
    M117 Job Ended

[gcode_macro PRINT_END]
description: End a CNC job (alias for FINISH_JOB)
gcode:
    FINISH_JOB

[gcode_macro END_PRINT]
description: End a CNC job (alias for FINISH_JOB)
gcode:
    FINISH_JOB

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
description: Cancel CNC job — park at Z25 X0 Y0, keep steppers on
gcode:
    # M5                                                                     ; stop spindle (disabled — no spindle wired yet)
    # M9                                                                     ; stop coolant (disabled — no spindle wired yet)
    SDCARD_RESET_FILE
    G90
    G53 G0 Z25 F4000               ; Lift Z
    G53 G0 X0 Y0 F3000            ; Park at origin
    M117 Job Cancelled
    BASE_CANCEL_PRINT
