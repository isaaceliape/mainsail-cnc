# E3CNC machine macros
# Include this file from printer.cfg (must be LAST include to override PAUSE/RESUME):
#   [include E3CNC/macros/e3cnc_macros.cfg]
[gcode_macro PRE_HOMING_Z]
description: Position spindle before z probing
gcode:
    G90
    G1 X4 Y3 F1200

[gcode_macro POST_HOMING_Z]
description: Position spindle before z probing
gcode:
    G90
    G1 Z50 F1200

[homing_override]
axes: xyz
gcode:
    G90
    {% if 'Z' in params and 'z' in printer.toolhead.homed_axes %}
        G91
        G1 Z5 F180
        G90
    {% endif %}
    {% if 'X' in params or 'Y' in params or 'Z' in params %}
        {% if 'X' in params %}
            G4 P2000
            G28 X
            G91
            G1 X4 F1200
            G90
        {% endif %}
        {% if 'Y' in params %}
            G4 P2000
            G28 Y
            G91
            G1 Y3 F1200
            G90
        {% endif %}
        {% if 'Z' in params %}
            G28 Z
            G90
            G0 Z50 F3000
        {% endif %}
    {% else %}
        G4 P2000
        G28 X
        G91
        G1 X4 F1200
        G90
        G4 P2000
        G28 Y
        G91
        G1 Y3 F1200
        G90
        G28 Z
        G90
        POST_HOMING_Z
    {% endif %}

[gcode_macro _HOME_X]
description: Home X axis with sensorless homing
gcode:
    G4 P2000
    G28 X
    G91
    G1 X4 F1200
    G90

[gcode_macro _HOME_Y]
description: Home Y axis with sensorless homing
gcode:
    G4 P2000
    G28 Y
    G91
    G1 Y3 F1200
    G90

[gcode_macro _HOME_Z]
description: Home Z axis
gcode:
    PRE_HOMING_Z
    G28 Z
    POST_HOMING_Z

# Dashboard compatibility aliases
[gcode_macro HOME_X]
description: Home X axis
gcode:
    _HOME_X

[gcode_macro HOME_Y]
description: Home Y axis
gcode:
    _HOME_Y

[gcode_macro HOME_Z]
description: Home Z axis
gcode:
    _HOME_Z

[gcode_macro BEEP_TEST]
description: Play a short beeper test pattern
gcode:
  M300 S880 P120
  G4 P80
  M300 S1320 P150
  G4 P80
  M300 S1760 P180

# ---------------------------------------------------------------------------
# CNC-safe PAUSE / RESUME / CANCEL_PRINT
# Override 3D-printer defaults (filament sensor, extruder, hotend).
# These must be the LAST [gcode_macro PAUSE] definition in the include
# order, so ensure e3cnc_macros.cfg is included LAST from printer.cfg.
# ---------------------------------------------------------------------------

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
description: Pause CNC job — stop spindle, lift Z, park at front center
gcode:
    {% set z = params.Z|default(10)|int %}
    M5                                                                      ; stop spindle
    M9                                                                      ; stop coolant
    {% if (printer.gcode_move.position.z + z) < printer.toolhead.axis_maximum.z %}
        G91
        G1 Z{z} F900
    {% endif %}
    G90
    G1 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} F6000
    SAVE_GCODE_STATE NAME=PAUSE_STATE
    BASE_PAUSE
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z}

[gcode_macro RESUME]
rename_existing: BASE_RESUME
description: Resume CNC job — return to position, restart spindle
variable_zhop: 0
gcode:
    {% if printer['pause_resume'].is_paused|int == 1 %}
        RESTORE_GCODE_STATE NAME=PAUSE_STATE MOVE=1 MOVE_SPEED=100
        G91
        G1 Z{zhop * -1} F900
        G90
        BASE_RESUME
        M3                                                                  ; restart spindle
    {% endif %}

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
description: Cancel CNC job — stop everything, park, disable steppers
gcode:
    M5                                                                      ; stop spindle
    M9                                                                      ; stop coolant
    SDCARD_RESET_FILE
    G90
    G53 G0 Z10 F500
    G53 G0 X0 Y0 F3000
    M84                                                                     ; disable steppers
    PRINT_END
    BASE_CANCEL_PRINT
