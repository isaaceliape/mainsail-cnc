# E3CNC machine macros
# Include this file from printer.cfg:
#   [include config/E3CNC/macros/e3cnc_macros.cfg]

[homing_override]
axes: xyz
gcode:
    G90
    {% if 'Z' in params and 'z' in printer.toolhead.homed_axes %}
        G91
        G1 Z5 F180
        G90
    {% endif %}
    {% if 'X' in params or 'Y' in params or 'Z' in params %}
        {% if 'X' in params %}
            G4 P2000
            G28 X
            G91
            G1 X5 F1200
            G90
        {% endif %}
        {% if 'Y' in params %}
            G4 P2000
            G28 Y
            G91
            G1 Y-5 F1200
            G90
        {% endif %}
        {% if 'Z' in params %}
            G28 Z
            G90
            G0 X4 Y5 F3000
        {% endif %}
    {% else %}
        G4 P2000
        G28 X
        G91
        G1 X5 F1200
        G90
        G4 P2000
        G28 Y
        G91
        G1 Y-5 F1200
        G90
        G28 Z
        G90
        G0 X4 Y5 F3000
    {% endif %}

[gcode_macro _HOME_X]
description: Home X axis with sensorless homing
gcode:
    G4 P2000
    G28 X
    G91
    G1 X5 F1200
    G90

[gcode_macro _HOME_Y]
description: Home Y axis with sensorless homing
gcode:
    G4 P2000
    G28 Y
    G91
    G1 Y-5 F1200
    G90

[gcode_macro _HOME_Z]
description: Home Z axis
gcode:
    G28 Z
    G90
    G0 X4 Y5 F3000

# Dashboard compatibility aliases
[gcode_macro HOME_X]
description: Home X axis
gcode:
    _HOME_X

[gcode_macro HOME_Y]
description: Home Y axis
gcode:
    _HOME_Y

[gcode_macro HOME_Z]
description: Home Z axis
gcode:
    _HOME_Z

[gcode_macro BEEP_TEST]
description: Play a short beeper test pattern
gcode:
  M300 S880 P120
  G4 P80
  M300 S1320 P150
  G4 P80
  M300 S1760 P180
